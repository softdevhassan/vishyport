{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="p-8 rounded-2xl border border-gray-800 bg-card">
        <h2 class="text-2xl font-bold text-white mb-6 text-center">Admin Access</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="p-3 mb-4 rounded border border-red-500/50 bg-red-500/10 text-red-400 text-sm text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <input type="text" name="username" required class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">
            </div>
            <button type="submit" class="w-full py-3 mt-4 rounded-lg bg-brand text-white font-medium hover:bg-brand/90 transition-colors">
                Login
            </button>
        </form>
    </div>
</div>
{% endblock %}

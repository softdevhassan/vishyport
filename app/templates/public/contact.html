{% extends "base.html" %}

{% block title %}Contact | {{ settings.name }}{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto space-y-12 pt-12">
    <div class="text-center space-y-6">
        <h1 class="text-5xl font-serif font-bold text-slate-800">Let's Connect</h1>
        <div class="w-16 h-1 bg-brand mx-auto rounded-full"></div>
        <p class="text-slate-600 text-lg">
            I am actively looking for academic collaborations, mentorship, and opportunities to learn.
        </p>
    </div>

    <div class="grid gap-6">
        <a href="mailto:{{ settings.email }}" class="p-8 rounded-3xl bg-white border border-gray-100 shadow-xl shadow-slate-200/50 hover:shadow-2xl hover:-translate-y-1 transition-all flex items-center justify-between group">
            <div class="flex items-center gap-6">
                <div class="w-14 h-14 rounded-full bg-slate-50 border border-gray-100 text-brand flex items-center justify-center">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                    <h3 class="text-slate-800 font-bold text-xl">Email Me</h3>
                    <p class="text-slate-500 mt-1">{{ settings.email }}</p>
                </div>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-brand group-hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </div>
        </a>
    </div>
</section>
{% endblock %}
